<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Clueeless</title>
    <style>
      :root {
        --panel-bg: linear-gradient(
          150deg,
          rgba(40, 42, 54, 0.55),
          rgba(18, 19, 26, 0.42)
        );
        --panel-border: rgba(255, 255, 255, 0.22);
        --text: rgba(255, 255, 255, 0.94);
        --accent: #ffce7a;
        --accent-strong: #ffb84a;
        --muted: rgba(255, 255, 255, 0.62);
        --field-bg: rgba(255, 255, 255, 0.06);
        --field-border: rgba(255, 255, 255, 0.16);
        --error: #ff867a;
        --ok: #5fd38a;
        --glass-blur: blur(22px) saturate(160%);
        --glass-highlight: rgba(255, 255, 255, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Grande", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 14px;
      }

      body[data-collapsed="on"] {
        padding: 8px;
      }

      /* collapsed: show only the small nub, hide the full panel */
      .nub {
        display: none;
      }

      body[data-collapsed="on"] .panel {
        display: none;
      }

      body[data-collapsed="on"] .nub {
        display: inline-flex;
      }

      /* When protection is ON, selection still works (copy/paste is fine) but
         the blue highlight is hidden so selecting text gives nothing away. */
      body[data-enabled="on"] ::selection {
        background: transparent;
        color: inherit;
      }

      body[data-enabled="on"] ::-moz-selection {
        background: transparent;
        color: inherit;
      }

      /* Also blank the textarea caret while hidden, so a blinking cursor
         doesn't reveal activity. */
      body[data-enabled="on"] textarea {
        caret-color: transparent;
      }

      .panel {
        position: relative;
        width: 420px;
        padding: 16px 18px;
        border-radius: 20px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        -webkit-backdrop-filter: var(--glass-blur);
        backdrop-filter: var(--glass-blur);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 var(--glass-highlight),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        display: grid;
        gap: 12px;
        overflow: hidden;
        animation: float-in 460ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(
          120% 80% at 0% 0%,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0) 55%
        );
        pointer-events: none;
      }

      .panel > * {
        position: relative;
        z-index: 1;
      }

      /* top bar: brand + the single hide toggle */
      .bar {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3px;
        color: var(--text);
      }

      .brand .spark {
        color: var(--accent-strong);
        margin-right: 6px;
      }

      .toggle {
        -webkit-app-region: no-drag;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0.06)
        );
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 150ms ease, background 150ms ease, box-shadow 150ms ease;
      }

      .toggle:hover {
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          0 6px 18px rgba(0, 0, 0, 0.3);
      }

      .toggle:active {
        transform: translateY(0);
      }

      .toggle[data-state="on"] {
        border-color: rgba(255, 184, 74, 0.5);
        color: var(--accent-strong);
        background: linear-gradient(
          180deg,
          rgba(255, 184, 74, 0.28),
          rgba(255, 184, 74, 0.1)
        );
      }

      .toggle svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* the collapsed nub — a tiny always-clickable glass pill */
      .nub {
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        -webkit-backdrop-filter: var(--glass-blur);
        backdrop-filter: var(--glass-blur);
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 var(--glass-highlight);
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.3px;
        cursor: move;
        -webkit-app-region: drag;
        animation: float-in 320ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .nub:hover {
        border-color: rgba(255, 184, 74, 0.5);
      }

      .nub .spark {
        color: var(--accent-strong);
      }

      .nub-label {
        margin-right: 2px;
      }

      /* the only no-drag target on the nub: click to expand */
      .nub-expand {
        -webkit-app-region: no-drag;
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: none;
      }

      .nub-expand svg {
        width: 14px;
        height: 14px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* tiny dot = honest capture-support signal (detail in tooltip) */
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        box-shadow: 0 0 6px currentColor;
      }

      .dot[data-level="full"] {
        background: var(--ok);
        color: var(--ok);
      }

      .dot[data-level="weak"] {
        background: var(--accent-strong);
        color: var(--accent-strong);
      }

      .dot[data-level="none"] {
        background: var(--error);
        color: var(--error);
      }

      .divider {
        height: 1px;
        width: 100%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0.18),
          rgba(255, 255, 255, 0)
        );
      }

      .assistant {
        display: grid;
        gap: 8px;
      }

      .assistant-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }

      .assistant-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .assistant-status {
        font-size: 11px;
        color: var(--accent);
      }

      textarea {
        width: 100%;
        min-height: 70px;
        resize: none;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--field-border);
        background: var(--field-bg);
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.25);
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Grande", "Segoe UI", sans-serif;
        font-size: 12px;
        line-height: 1.4;
        transition: border-color 150ms ease, box-shadow 150ms ease;
        -webkit-app-region: no-drag;
      }

      textarea:focus {
        outline: none;
        border-color: rgba(255, 184, 74, 0.55);
        box-shadow:
          inset 0 1px 3px rgba(0, 0, 0, 0.25),
          0 0 0 3px rgba(255, 184, 74, 0.15);
      }

      .assistant-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      button {
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0.06)
        );
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        transition: transform 150ms ease, background 150ms ease, box-shadow 150ms ease;
        -webkit-app-region: no-drag;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          0 6px 18px rgba(0, 0, 0, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        transform: none;
      }

      button.ghost {
        background: transparent;
        border-color: rgba(255, 255, 255, 0.14);
        box-shadow: none;
      }

      .answer {
        min-height: 96px;
        max-height: 160px;
        overflow: auto;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.22);
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        font-size: 12px;
        line-height: 1.45;
        color: var(--text);
        white-space: pre-wrap;
        -webkit-app-region: no-drag;
      }

      .answer[data-state="error"] {
        border-color: rgba(255, 134, 122, 0.5);
        color: var(--error);
      }

      .answer[data-state="idle"] {
        color: var(--muted);
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body data-enabled="off" data-busy="off">
    <div class="panel">
      <div class="bar">
        <div class="brand"><span class="spark">✦</span>Clueeless</div>
        <button
          id="toggle-collapse"
          class="toggle"
          data-state="on"
          title="Hide to a small nub"
        >
          <span class="dot" id="support-dot" data-level="none"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" />
            <circle cx="12" cy="12" r="3.5" />
          </svg>
          <span id="collapse-label">Hide</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="assistant">
        <div class="assistant-header">
          <div class="assistant-meta" id="ai-meta">AI: not configured</div>
          <div class="assistant-status" id="ai-status">Idle</div>
        </div>
        <textarea id="prompt-input" placeholder="Ask the assistant..." rows="3"></textarea>
        <div class="assistant-actions">
          <button id="ask-button">Ask</button>
          <button id="clear-button" class="ghost">Clear</button>
        </div>
        <div class="answer" id="answer" data-state="idle">Waiting for a prompt.</div>
      </div>
    </div>

    <div id="nub" class="nub" title="Drag to move">
      <span class="dot" id="nub-dot" data-level="none"></span>
      <span class="spark">✦</span>
      <span class="nub-label">Clueeless</span>
      <button id="nub-expand" class="nub-expand" title="Show Clueeless" aria-label="Show">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 14v6h6M20 10V4h-6M14 10l6-6M10 14l-6 6" />
        </svg>
      </button>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
